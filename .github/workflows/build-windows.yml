name: Build Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter config --enable-windows-desktop

      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package portable .exe build
        run: Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath Graystone-Windows-Portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: graystone-windows-portable
          path: Graystone-Windows-Portable.zip

      - name: Build one-click installer (Inno Setup)
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer\Graystone.iss
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: graystone-windows-installer
          path: windows/installer/installer_out/GraystoneSetup.exe

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          files: |
            Graystone-Windows-Portable.zip
            windows/installer/installer_out/GraystoneSetup.exe
