name: graystone
description: Graystone - a cross-platform client for AnythingLLM and OpenAI-compatible LLM servers.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP client for talking to LLM servers
  http: ^1.2.1
  # Cross-platform key/value storage (connections, settings)
  shared_preferences: ^2.2.3
  # Open links in the system browser
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
